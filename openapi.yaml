openapi: 3.0.3
info:
  title: Direct API
  description: >
    Order straight from the restaurant, skipping the delivery-platform tax.
    This contract is the source of truth: the backend implements it and the frontend
    consumes it; no client talks to storage directly. Ordering lands in a later milestone.
  version: 0.3.0
paths:
  /health:
    get:
      operationId: health
      summary: Liveness probe.
      responses:
        '200':
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /restaurants:
    get:
      operationId: listRestaurants
      summary: List restaurants that deliver to an address.
      security:
        - bearerAuth: []
      parameters:
        - name: address
          in: query
          required: false
          description: The customer's delivery address; only restaurants that deliver to it are returned.
          schema:
            type: string
      responses:
        '200':
          description: Restaurants that deliver to the address.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRestaurantsResponse'
        '401':
          description: Missing or invalid access token.
  /restaurants/{id}:
    get:
      operationId: getRestaurant
      summary: Get one restaurant with its full menu.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The restaurant and its menu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Restaurant'
        '401':
          description: Missing or invalid access token.
        '404':
          description: No restaurant with that id.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Restaurant:
      type: object
      required: [id, name, suburb, address, deliversToPostcodes]
      properties:
        id:
          type: string
        name:
          type: string
        suburb:
          type: string
        address:
          type: string
        phone:
          type: string
        deliversToPostcodes:
          type: array
          items:
            type: string
        menu:
          type: array
          description: Populated on the detail read; omitted from list results.
          items:
            $ref: '#/components/schemas/MenuItem'
    MenuItem:
      type: object
      required: [id, name, priceCents, category]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        priceCents:
          type: integer
          format: int64
          description: Direct in-store price in cents (integer money, no floats).
        category:
          type: string
    ListRestaurantsResponse:
      type: object
      required: [restaurants]
      properties:
        restaurants:
          type: array
          items:
            $ref: '#/components/schemas/Restaurant'
